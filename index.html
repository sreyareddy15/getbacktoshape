<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Khana Tracker"/>
<meta name="theme-color" content="#1a0a00"/>
<title>Khana Tracker 🍛</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --saffron:#FF6B2B;--turmeric:#F5A623;--masala:#C1440E;--cardamom:#2D5016;
    --cream:#FFF8F0;--dark:#1a0a00;--card:#2a1200;--border:#3d1f00;
    --text:#f0e0d0;--muted:#a07060;--green:#4CAF50;--blue:#64B5F6;--purple:#CE93D8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse at 20% 0%,rgba(255,107,43,.12) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 100%,rgba(197,68,14,.1) 0%,transparent 60%);}
  .header{padding:20px 20px 0;text-align:center;}
  .header h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;
    background:linear-gradient(135deg,var(--saffron),var(--turmeric));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .header p{color:var(--muted);font-size:.8rem;margin-top:2px;}
  .tabs{display:flex;margin:16px 16px 0;background:var(--card);border-radius:12px;
    padding:4px;border:1px solid var(--border);}
  .tab{flex:1;padding:10px 8px;border:none;background:transparent;color:var(--muted);
    font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;
    border-radius:8px;transition:all .2s;}
  .tab.active{background:var(--saffron);color:white;}
  .panel{display:none;padding:16px;}
  .panel.active{display:block;}

  /* FOOD INPUT */
  .food-input-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px;}
  .food-input-card h3{color:var(--turmeric);font-size:.9rem;margin-bottom:10px;}
  .food-textarea{width:100%;background:#1a0800;border:1px solid var(--border);border-radius:12px;
    padding:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;resize:none;min-height:80px;}
  .food-textarea::placeholder{color:var(--muted);}
  .log-btn{width:100%;margin-top:10px;padding:14px;
    background:linear-gradient(135deg,var(--saffron),var(--masala));
    color:white;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;
    font-size:.95rem;font-weight:600;cursor:pointer;}
  .log-btn:disabled{opacity:.5;cursor:not-allowed;}

  /* SUMMARY */
  .daily-summary{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px;}
  .daily-summary h3{color:var(--turmeric);font-size:.9rem;margin-bottom:12px;}
  .macro-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .macro-chip{background:#1a0800;border-radius:10px;padding:10px;text-align:center;}
  .macro-chip .val{font-size:1.3rem;font-weight:700;}
  .macro-chip .lbl{font-size:.7rem;color:var(--muted);margin-top:2px;}
  .macro-chip.cal .val{color:var(--saffron);}
  .macro-chip.pro .val{color:var(--blue);}
  .macro-chip.car .val{color:var(--turmeric);}
  .macro-chip.fat .val{color:var(--purple);}
  .goal-bar-wrap{margin-top:12px;}
  .goal-bar-label{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-bottom:4px;}
  .goal-bar{background:#1a0800;border-radius:999px;height:8px;overflow:hidden;}
  .goal-bar-fill{height:100%;border-radius:999px;transition:width .6s ease;}
  .goal-bar-fill.cal{background:linear-gradient(90deg,var(--saffron),var(--turmeric));}
  .goal-bar-fill.pro{background:var(--blue);}
  .goal-bar-fill.car{background:var(--turmeric);}

  /* ENTRIES */
  .entries-list{display:flex;flex-direction:column;gap:10px;}
  .entry-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;animation:slideIn .3s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .entry-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
  .entry-name{font-weight:600;font-size:.95rem;color:var(--cream);flex:1;padding-right:8px;}
  .entry-cal{color:var(--saffron);font-weight:700;font-size:.95rem;white-space:nowrap;}
  .entry-qty{color:var(--muted);font-size:.75rem;margin-top:2px;}
  .entry-macros{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap;}
  .entry-macro{font-size:.75rem;}
  .entry-category{display:inline-block;margin-top:6px;background:rgba(255,107,43,.15);
    color:var(--saffron);font-size:.65rem;padding:2px 8px;border-radius:999px;
    font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
  .entry-micros{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
  .entry-micros-title{font-size:.7rem;color:var(--muted);margin-bottom:4px;}
  .micros-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .micro-tag{font-size:.68rem;background:#1a0800;padding:2px 8px;border-radius:6px;color:var(--text);}

  /* EDIT / DELETE BUTTONS */
  .entry-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
  .entry-btn{flex:1;padding:8px 10px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;
    font-size:.78rem;font-weight:600;cursor:pointer;transition:opacity .15s;}
  .entry-btn:active{opacity:.7;}
  .btn-edit{background:rgba(100,181,246,.15);color:var(--blue);}
  .btn-delete{background:rgba(239,83,80,.15);color:#ef5350;}

  /* EDIT MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);
    display:flex;align-items:flex-end;z-index:1000;
    opacity:0;pointer-events:none;transition:opacity .25s;}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:20px 20px 0 0;
    padding:20px;width:100%;transform:translateY(100%);transition:transform .3s ease;}
  .modal-overlay.open .modal{transform:translateY(0);}
  .modal h3{color:var(--turmeric);font-size:.95rem;margin-bottom:14px;}
  .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .modal-field label{display:block;font-size:.72rem;color:var(--muted);margin-bottom:4px;}
  .modal-field input{width:100%;background:#1a0800;border:1px solid var(--border);
    border-radius:10px;padding:10px 12px;color:var(--text);
    font-family:'DM Sans',sans-serif;font-size:.88rem;}
  .modal-full{grid-column:1/-1;}
  .modal-actions{display:flex;gap:10px;}
  .modal-save{flex:2;padding:13px;background:linear-gradient(135deg,var(--saffron),var(--masala));
    color:white;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;}
  .modal-cancel{flex:1;padding:13px;background:transparent;border:1px solid var(--border);
    color:var(--muted);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.9rem;cursor:pointer;}

  .loading-card{background:var(--card);border:1px dashed var(--border);border-radius:14px;
    padding:20px;text-align:center;color:var(--muted);font-size:.85rem;}
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);
    border-top-color:var(--saffron);border-radius:50%;animation:spin .8s linear infinite;
    vertical-align:middle;margin-right:8px;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* PROFILE */
  .profile-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px;}
  .profile-card h3{color:var(--turmeric);font-size:.9rem;margin-bottom:14px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .form-field label{display:block;font-size:.72rem;color:var(--muted);margin-bottom:4px;}
  .form-field input,.form-field select{width:100%;background:#1a0800;border:1px solid var(--border);
    border-radius:10px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;
    font-size:.88rem;-webkit-appearance:none;}
  .form-field select option{background:var(--dark);}
  .form-full{grid-column:1/-1;}
  .calc-btn{width:100%;margin-top:14px;padding:14px;
    background:linear-gradient(135deg,var(--cardamom),#3d7020);
    color:white;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;
    font-size:.95rem;font-weight:600;cursor:pointer;}

  /* RESULTS */
  .results-card{background:var(--card);border:1px solid var(--border);border-radius:16px;
    padding:16px;margin-bottom:16px;animation:slideIn .4s ease;}
  .results-card h3{color:var(--turmeric);font-size:.9rem;margin-bottom:14px;}
  .bmi-display{display:flex;align-items:center;gap:14px;margin-bottom:16px;
    padding:14px;background:#1a0800;border-radius:12px;}
  .bmi-num{font-size:2.5rem;font-weight:900;font-family:'Playfair Display',serif;}
  .bmi-info .bmi-cat{font-weight:700;font-size:1rem;}
  .bmi-info .bmi-sub{color:var(--muted);font-size:.75rem;margin-top:2px;}
  .bmi-normal{color:var(--green);}.bmi-over{color:var(--turmeric);}
  .bmi-obese{color:#ef5350;}.bmi-under{color:var(--blue);}
  .goals-section h4{font-size:.8rem;color:var(--muted);margin-bottom:10px;
    text-transform:uppercase;letter-spacing:.08em;}
  .goal-row{display:flex;justify-content:space-between;align-items:center;
    padding:10px 0;border-bottom:1px solid var(--border);}
  .goal-row:last-child{border-bottom:none;}
  .goal-row-label{font-size:.85rem;}
  .goal-row-val{font-weight:700;font-size:.95rem;color:var(--saffron);}
  .goal-row-val.blue{color:var(--blue);}.goal-row-val.green{color:var(--green);}
  .goal-row-val.purple{color:var(--purple);}.goal-row-val.yellow{color:var(--turmeric);}
  .target-weight-card{background:rgba(255,107,43,.08);border:1px solid rgba(255,107,43,.2);
    border-radius:12px;padding:12px;margin:12px 0;}
  .target-weight-card p{font-size:.82rem;line-height:1.6;color:var(--cream);}
  .target-weight-card strong{color:var(--saffron);}
  .micros-needed{margin-top:14px;}
  .micros-needed h4{font-size:.8rem;color:var(--muted);margin-bottom:10px;
    text-transform:uppercase;letter-spacing:.08em;}
  .micro-needed-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .micro-needed-item{background:#1a0800;border-radius:10px;padding:10px;display:flex;flex-direction:column;}
  .micro-needed-item .mn-name{font-size:.72rem;color:var(--muted);}
  .micro-needed-item .mn-val{font-size:.95rem;font-weight:700;color:var(--cream);margin-top:2px;}

  .clear-btn{width:100%;padding:12px;background:transparent;border:1px solid var(--border);
    border-radius:12px;color:var(--muted);font-family:'DM Sans',sans-serif;
    font-size:.85rem;cursor:pointer;margin-top:8px;}
  .empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
  .empty-state .emoji{font-size:3rem;margin-bottom:12px;}
  .empty-state p{font-size:.85rem;line-height:1.6;}
  .date-strip{text-align:center;font-size:.75rem;color:var(--muted);margin-bottom:12px;
    letter-spacing:.05em;text-transform:uppercase;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--green);color:white;padding:10px 20px;border-radius:999px;
    font-size:.82rem;font-weight:600;opacity:0;transition:opacity .3s;
    pointer-events:none;z-index:999;white-space:nowrap;}
  .toast.show{opacity:1;}
  .toast.error{background:#ef5350;}
</style>
</head>
<body>

<div class="header">
  <h1>🍛 Khana Tracker</h1>
  <p>AI-powered Indian food calorie tracker</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('log')">🥘 Food Log</button>
  <button class="tab" onclick="switchTab('profile')">👤 My Goals</button>
</div>

<!-- FOOD LOG -->
<div class="panel active" id="panel-log">
  <div class="food-input-card">
    <h3>What did you eat?</h3>
    <textarea class="food-textarea" id="foodInput"
      placeholder="e.g. 2 rotis with dal makhani and a small bowl of raita&#10;&#10;or: pav bhaji plate, 1 glass lassi&#10;&#10;Describe freely — AI will analyse it!"></textarea>
    <button class="log-btn" id="logBtn" onclick="logFood()">✨ Analyse &amp; Add</button>
  </div>

  <div class="daily-summary" id="dailySummary" style="display:none">
    <h3>Today's Total</h3>
    <div class="macro-grid">
      <div class="macro-chip cal"><div class="val" id="totalCal">0</div><div class="lbl">Calories (kcal)</div></div>
      <div class="macro-chip pro"><div class="val" id="totalPro">0g</div><div class="lbl">Protein</div></div>
      <div class="macro-chip car"><div class="val" id="totalCarb">0g</div><div class="lbl">Carbs</div></div>
      <div class="macro-chip fat"><div class="val" id="totalFat">0g</div><div class="lbl">Fat</div></div>
    </div>
    <div id="goalBars" style="display:none">
      <hr style="border:none;border-top:1px solid var(--border);margin:14px 0"/>
      <div class="goal-bar-wrap">
        <div class="goal-bar-label"><span>Calories</span><span id="barCalLbl"></span></div>
        <div class="goal-bar"><div class="goal-bar-fill cal" id="barCal" style="width:0%"></div></div>
      </div>
      <div class="goal-bar-wrap" style="margin-top:8px">
        <div class="goal-bar-label"><span>Protein</span><span id="barProLbl"></span></div>
        <div class="goal-bar"><div class="goal-bar-fill pro" id="barPro" style="width:0%"></div></div>
      </div>
      <div class="goal-bar-wrap" style="margin-top:8px">
        <div class="goal-bar-label"><span>Carbs</span><span id="barCarLbl"></span></div>
        <div class="goal-bar"><div class="goal-bar-fill car" id="barCar" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <div class="date-strip" id="dateStrip"></div>
  <div class="entries-list" id="entriesList">
    <div class="empty-state">
      <div class="emoji">🍽️</div>
      <p>No food logged yet today.<br/>Type what you ate above and let AI do the rest!</p>
    </div>
  </div>
  <button class="clear-btn" id="clearBtn" onclick="clearDay()" style="display:none">🗑️ Clear today's log</button>
</div>

<!-- PROFILE -->
<div class="panel" id="panel-profile">
  <div class="profile-card">
    <h3>📋 Your Details</h3>
    <div class="form-grid">
      <div class="form-field"><label>Age (years)</label><input type="number" id="age" placeholder="28" min="10" max="100"/></div>
      <div class="form-field"><label>Sex</label><select id="sex"><option value="male">Male</option><option value="female">Female</option></select></div>
      <div class="form-field"><label>Height (cm)</label><input type="number" id="height" placeholder="170"/></div>
      <div class="form-field"><label>Current Weight (kg)</label><input type="number" id="currentWeight" placeholder="75" step="0.1"/></div>
      <div class="form-field"><label>Target Weight (kg)</label><input type="number" id="targetWeight" placeholder="65" step="0.1"/></div>
      <div class="form-field"><label>Months to achieve</label><input type="number" id="months" placeholder="4" min="1" max="24"/></div>
      <div class="form-field form-full"><label>Activity Level</label>
        <select id="activity">
          <option value="1.2">Sedentary (desk job, no exercise)</option>
          <option value="1.375">Light (1-3 days/week)</option>
          <option value="1.55" selected>Moderate (3-5 days/week)</option>
          <option value="1.725">Active (6-7 days/week)</option>
          <option value="1.9">Very Active (athlete / physical job)</option>
        </select>
      </div>
    </div>
    <button class="calc-btn" onclick="calculateGoals()">🧮 Calculate My Goals</button>
  </div>
  <div id="resultsSection"></div>
</div>

<!-- EDIT MODAL (slides up from bottom) -->
<div class="modal-overlay" id="editModal" onclick="closeEditModal(event)">
  <div class="modal">
    <h3>✏️ Edit Food Item</h3>
    <div class="modal-grid">
      <div class="modal-field modal-full"><label>Food Name</label><input type="text" id="editName"/></div>
      <div class="modal-field modal-full"><label>Quantity / Serving</label><input type="text" id="editQty"/></div>
      <div class="modal-field"><label>Calories (kcal)</label><input type="number" id="editCal" min="0"/></div>
      <div class="modal-field"><label>Protein (g)</label><input type="number" id="editPro" min="0" step="0.1"/></div>
      <div class="modal-field"><label>Carbs (g)</label><input type="number" id="editCarb" min="0" step="0.1"/></div>
      <div class="modal-field"><label>Fat (g)</label><input type="number" id="editFat" min="0" step="0.1"/></div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="modal-save" onclick="saveEdit()">💾 Save Changes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── REPLACE THIS with your Cloudflare Worker URL after setup ──
// If you haven't set it up yet, leave it empty and the app will ask for your Gemini key once
const WORKER_URL = '';

// ── STATE ──
let entries = JSON.parse(localStorage.getItem('kh_entries_' + todayKey()) || '[]');
let profile = JSON.parse(localStorage.getItem('kh_profile') || '{}');
let goals   = JSON.parse(localStorage.getItem('kh_goals')   || '{}');
let editTarget = null;

function todayKey() { return new Date().toISOString().split('T')[0]; }
function saveEntries() { localStorage.setItem('kh_entries_' + todayKey(), JSON.stringify(entries)); }

window.onload = () => {
  ['age','sex','height','currentWeight','targetWeight','months','activity']
    .forEach(k => { if (profile[k]) document.getElementById(k).value = profile[k]; });
  document.getElementById('dateStrip').textContent =
    new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  renderEntries();
  if (goals.calories) updateGoalBars();
};

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) =>
    t.classList.toggle('active',(i===0&&tab==='log')||(i===1&&tab==='profile')));
  document.getElementById('panel-log').classList.toggle('active',tab==='log');
  document.getElementById('panel-profile').classList.toggle('active',tab==='profile');
}

// ─────────────────────────────────────────
// FOOD LOG
// ─────────────────────────────────────────
async function logFood() {
  const text = document.getElementById('foodInput').value.trim();
  if (!text) { showToast('Please describe what you ate', true); return; }
  const btn = document.getElementById('logBtn');
  btn.disabled = true; btn.textContent = '⏳ Analysing...';

  const loadId = 'load_' + Date.now();
  const loadEl = document.createElement('div');
  loadEl.className='loading-card'; loadEl.id=loadId;
  loadEl.innerHTML='<span class="spinner"></span> Asking AI nutritionist...';
  const list = document.getElementById('entriesList');
  list.querySelector('.empty-state')?.remove();
  list.prepend(loadEl);

  try {
    let raw;

    if (WORKER_URL) {
      // API key hidden in Cloudflare Worker
      const res = await fetch(WORKER_URL, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({food: text})
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      raw = data.result;
    } else {
      // Fallback: use key stored in browser (prompted once)
      let key = localStorage.getItem('kh_apikey') || '';
      if (!key) {
        key = prompt('Paste your Gemini API key (from aistudio.google.com/apikey).\nIt will be saved locally on this device only:');
        if (!key) throw new Error('No API key provided');
        localStorage.setItem('kh_apikey', key.trim());
      }
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key.trim()}`,
        { method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({contents:[{parts:[{text: buildPrompt(text)}]}],
            generationConfig:{temperature:0.2,maxOutputTokens:1200}}) }
      );
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      raw = data.candidates[0].content.parts[0].text.trim();
    }

    raw = raw.replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/```$/i,'').trim();
    const parsed = JSON.parse(raw);
    const timestamp = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    const entry = {id:Date.now(), input:text, timestamp, meal_type:parsed.meal_type, items:parsed.items, notes:parsed.notes};
    entries.unshift(entry);
    saveEntries();
    document.getElementById(loadId)?.remove();
    renderEntry(entry, true);
    updateTotals();
    document.getElementById('foodInput').value = '';
    showToast('✅ Food logged!');

  } catch(e) {
    document.getElementById(loadId)?.remove();
    // If key failed, clear it so user can re-enter
    if (e.message && e.message.includes('API_KEY')) localStorage.removeItem('kh_apikey');
    showToast('Error: ' + (e.message || 'Something went wrong'), true);
    if (!document.getElementById('entriesList').children.length) renderEmptyState();
  }
  btn.disabled=false; btn.textContent='✨ Analyse & Add';
}

function buildPrompt(text) {
  return `You are an expert Indian food nutritionist. Analyse the food described and return ONLY valid JSON with no markdown or backticks:
{"items":[{"name":"Food name","quantity":"serving","category":"one of: Roti/Bread, Rice/Grain, Dal/Lentil, Sabzi/Vegetable, Meat/Fish/Egg, Dairy/Paneer, Snack/Street Food, Beverage, Sweet/Dessert, Salad/Raita, Condiment","calories":number,"protein_g":number,"carbs_g":number,"fat_g":number,"fiber_g":number,"micros":{"iron_mg":number,"calcium_mg":number,"vitamin_c_mg":number,"vitamin_b12_mcg":number,"sodium_mg":number,"potassium_mg":number}}],"meal_type":"Breakfast/Lunch/Dinner/Snack","total_calories":number,"notes":"1 line health note"}
User said: ${text}`;
}

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function renderEntries() {
  const list = document.getElementById('entriesList');
  list.innerHTML = '';
  if (!entries.length) { renderEmptyState(); return; }
  entries.forEach(e => renderEntry(e, false));
  updateTotals();
  document.getElementById('clearBtn').style.display = 'block';
}

function renderEntry(entry, prepend=false) {
  const list = document.getElementById('entriesList');
  document.getElementById('clearBtn').style.display = 'block';
  // Remove old cards for this entry (re-render after edit)
  document.querySelectorAll(`[data-entry-id="${entry.id}"]`).forEach(el => el.remove());

  const fragment = document.createDocumentFragment();

  if (entry.notes) {
    const note = document.createElement('div');
    note.dataset.entryId = entry.id;
    note.style.cssText = 'font-size:.75rem;color:var(--muted);padding:0 4px;font-style:italic;';
    note.textContent = '💡 ' + entry.notes;
    fragment.appendChild(note);
  }

  // Append items in reverse so prepend order is correct
  const cards = entry.items.map((item, itemIndex) => {
    const micros = item.micros || {};
    const microTags = Object.entries(micros)
      .filter(([,v]) => v && v > 0)
      .map(([k,v]) => {
        const label = k.replace(/_mg$|_mcg$|_g$/,'').replace(/_/g,' ');
        const unit = k.endsWith('mcg') ? 'mcg' : 'mg';
        return `<span class="micro-tag">${label}: ${v}${unit}</span>`;
      }).join('');

    const card = document.createElement('div');
    card.className = 'entry-card';
    card.dataset.entryId = entry.id;
    card.innerHTML = `
      <div class="entry-header">
        <div style="flex:1">
          <div class="entry-name">${item.name}</div>
          <div class="entry-qty">${item.quantity} &middot; ${entry.timestamp} &middot; ${entry.meal_type}</div>
        </div>
        <div class="entry-cal">${item.calories} kcal</div>
      </div>
      <div class="entry-macros">
        <div class="entry-macro" style="color:var(--blue)">P: ${item.protein_g}g</div>
        <div class="entry-macro" style="color:var(--turmeric)">C: ${item.carbs_g}g</div>
        <div class="entry-macro" style="color:var(--purple)">F: ${item.fat_g}g</div>
        <div class="entry-macro" style="color:var(--green)">Fiber: ${item.fiber_g}g</div>
      </div>
      <span class="entry-category">${item.category}</span>
      ${microTags ? `<div class="entry-micros"><div class="entry-micros-title">Micronutrients</div><div class="micros-grid">${microTags}</div></div>` : ''}
      <div class="entry-actions">
        <button class="entry-btn btn-edit" onclick="openEditModal(${entry.id},${itemIndex})">✏️ Edit</button>
        <button class="entry-btn btn-delete" onclick="deleteItem(${entry.id},${itemIndex})">🗑️ Delete</button>
      </div>`;
    return card;
  });

  cards.forEach(c => fragment.appendChild(c));

  if (prepend) {
    // Insert fragment before first child
    list.insertBefore(fragment, list.firstChild);
  } else {
    list.appendChild(fragment);
  }
}

function renderEmptyState() {
  document.getElementById('entriesList').innerHTML =
    `<div class="empty-state"><div class="emoji">🍽️</div>
     <p>No food logged yet today.<br/>Type what you ate above and let AI do the rest!</p></div>`;
  document.getElementById('clearBtn').style.display = 'none';
}

// ─────────────────────────────────────────
// DELETE
// ─────────────────────────────────────────
function deleteItem(entryId, itemIndex) {
  if (!confirm('Delete this item?')) return;
  const entry = entries.find(e => e.id === entryId);
  if (!entry) return;
  entry.items.splice(itemIndex, 1);
  if (!entry.items.length) entries = entries.filter(e => e.id !== entryId);
  saveEntries();
  renderEntries();
  if (!entries.length) document.getElementById('dailySummary').style.display = 'none';
  showToast('Deleted');
}

// ─────────────────────────────────────────
// EDIT MODAL
// ─────────────────────────────────────────
function openEditModal(entryId, itemIndex) {
  const entry = entries.find(e => e.id === entryId);
  if (!entry) return;
  const item = entry.items[itemIndex];
  editTarget = {entryId, itemIndex};
  document.getElementById('editName').value  = item.name;
  document.getElementById('editQty').value   = item.quantity;
  document.getElementById('editCal').value   = item.calories;
  document.getElementById('editPro').value   = item.protein_g;
  document.getElementById('editCarb').value  = item.carbs_g;
  document.getElementById('editFat').value   = item.fat_g;
  document.getElementById('editModal').classList.add('open');
}

function closeEditModal(e) {
  if (e && e.target !== document.getElementById('editModal')) return;
  document.getElementById('editModal').classList.remove('open');
  editTarget = null;
}

function saveEdit() {
  if (!editTarget) return;
  const {entryId, itemIndex} = editTarget;
  const entry = entries.find(e => e.id === entryId);
  if (!entry) return;
  const item = entry.items[itemIndex];
  item.name      = document.getElementById('editName').value.trim()  || item.name;
  item.quantity  = document.getElementById('editQty').value.trim()   || item.quantity;
  item.calories  = parseFloat(document.getElementById('editCal').value)  || 0;
  item.protein_g = parseFloat(document.getElementById('editPro').value)  || 0;
  item.carbs_g   = parseFloat(document.getElementById('editCarb').value) || 0;
  item.fat_g     = parseFloat(document.getElementById('editFat').value)  || 0;
  saveEntries();
  document.getElementById('editModal').classList.remove('open');
  editTarget = null;
  renderEntries();
  updateTotals();
  showToast('✅ Updated!');
}

// ─────────────────────────────────────────
// TOTALS & GOAL BARS
// ─────────────────────────────────────────
function updateTotals() {
  let cal=0,pro=0,carb=0,fat=0;
  entries.forEach(e => e.items.forEach(i => {
    cal+=i.calories||0; pro+=i.protein_g||0; carb+=i.carbs_g||0; fat+=i.fat_g||0;
  }));
  const summary = document.getElementById('dailySummary');
  if (entries.length) {
    summary.style.display = 'block';
    document.getElementById('totalCal').textContent  = Math.round(cal);
    document.getElementById('totalPro').textContent  = Math.round(pro)  + 'g';
    document.getElementById('totalCarb').textContent = Math.round(carb) + 'g';
    document.getElementById('totalFat').textContent  = Math.round(fat)  + 'g';
    if (goals.calories) updateGoalBars(cal, pro, carb);
  } else { summary.style.display = 'none'; }
}

function updateGoalBars(cal, pro, carb) {
  if (!goals.calories) return;
  document.getElementById('goalBars').style.display = 'block';
  const pct = (a,b) => Math.min(100, Math.round((a/b)*100));
  document.getElementById('barCal').style.width = pct(cal,  goals.calories) + '%';
  document.getElementById('barPro').style.width = pct(pro,  goals.protein)  + '%';
  document.getElementById('barCar').style.width = pct(carb, goals.carbs)    + '%';
  document.getElementById('barCalLbl').textContent = `${Math.round(cal)} / ${goals.calories} kcal`;
  document.getElementById('barProLbl').textContent = `${Math.round(pro)} / ${goals.protein}g`;
  document.getElementById('barCarLbl').textContent = `${Math.round(carb)} / ${goals.carbs}g`;
}

function clearDay() {
  if (!confirm('Clear all food for today?')) return;
  entries = []; saveEntries(); renderEmptyState();
  document.getElementById('dailySummary').style.display = 'none';
}

// ─────────────────────────────────────────
// PROFILE / GOALS
// ─────────────────────────────────────────
function calculateGoals() {
  const age=+document.getElementById('age').value, sex=document.getElementById('sex').value,
        height=+document.getElementById('height').value, cw=+document.getElementById('currentWeight').value,
        tw=+document.getElementById('targetWeight').value, months=+document.getElementById('months').value,
        activity=+document.getElementById('activity').value;
  if (!age||!height||!cw||!tw||!months) { showToast('Please fill all fields',true); return; }
  profile={age,sex,height,currentWeight:cw,targetWeight:tw,months,activity};
  localStorage.setItem('kh_profile',JSON.stringify(profile));

  const hm=height/100, bmi=cw/(hm*hm), bmiR=Math.round(bmi*10)/10;
  const idealLow=Math.round(18.5*hm*hm), idealHigh=Math.round(24.9*hm*hm);
  let bmiCat,bmiClass;
  if(bmi<18.5){bmiCat='Underweight';bmiClass='bmi-under';}
  else if(bmi<25){bmiCat='Normal Weight ✓';bmiClass='bmi-normal';}
  else if(bmi<27.5){bmiCat='Borderline Overweight';bmiClass='bmi-over';}
  else if(bmi<30){bmiCat='Overweight';bmiClass='bmi-over';}
  else{bmiCat='Obese';bmiClass='bmi-obese';}

  const bmr = sex==='male' ? 10*cw+6.25*height-5*age+5 : 10*cw+6.25*height-5*age-161;
  const tdee=bmr*activity, dailyAdj=(cw-tw)*7700/(months*30.4);
  const targetCal=Math.max(1200,Math.round(tdee-dailyAdj));
  const protein=Math.round(tw*1.6), fat=Math.round((targetCal*.28)/9);
  const carbs=Math.round((targetCal-protein*4-fat*9)/4);
  const weeklyLoss=Math.round(((cw-tw)/(months*4.3))*10)/10;

  goals={calories:targetCal,protein,carbs,fat};
  localStorage.setItem('kh_goals',JSON.stringify(goals));

  const micros=[
    {name:'Iron',val:sex==='female'?'18 mg':'8 mg',note:sex==='female'?'Higher for women':''},
    {name:'Calcium',val:'1000 mg',note:'Milk, paneer, ragi'},
    {name:'Vitamin D',val:'600 IU',note:'Sunlight + fortified milk'},
    {name:'Vitamin B12',val:'2.4 mcg',note:'Dairy, eggs, fortified foods'},
    {name:'Vitamin C',val:'65 mg',note:'Amla, citrus, tomatoes'},
    {name:'Potassium',val:'3500 mg',note:'Banana, coconut water'},
    {name:'Sodium',val:'< 2300 mg',note:'Limit salt & pickles'},
    {name:'Fiber',val:'25–30 g',note:'Dal, vegetables, whole grains'},
    {name:'Omega-3',val:'1.6 g',note:'Flaxseed, walnuts, fish'},
    {name:'Zinc',val:'8–11 mg',note:'Pumpkin seeds, legumes'},
  ];

  document.getElementById('resultsSection').innerHTML = `
    <div class="results-card">
      <h3>📊 Your Health Report</h3>
      <div class="bmi-display">
        <div class="bmi-num ${bmiClass}">${bmiR}</div>
        <div class="bmi-info">
          <div class="bmi-cat ${bmiClass}">${bmiCat}</div>
          <div class="bmi-sub">Your BMI</div>
          <div class="bmi-sub">Healthy range: ${idealLow}–${idealHigh} kg</div>
        </div>
      </div>
      <div class="target-weight-card"><p>
        <strong>${cw} kg → ${tw} kg</strong> in <strong>${months} months</strong> =
        <strong>${Math.abs(cw-tw)} kg ${cw>=tw?'to lose':'to gain'}</strong> at
        <strong>${Math.abs(weeklyLoss)} kg/week</strong>
        ${Math.abs(weeklyLoss)<=0.75?'✅ healthy & sustainable!':'⚠️ consider slowing down for sustainability'}
      </p></div>
      <div class="goals-section">
        <h4>Daily Goals</h4>
        <div class="goal-row"><span class="goal-row-label">🔥 Calories</span><span class="goal-row-val">${targetCal} kcal</span></div>
        <div class="goal-row"><span class="goal-row-label">💪 Protein</span><span class="goal-row-val blue">${protein} g</span></div>
        <div class="goal-row"><span class="goal-row-label">🍚 Carbohydrates</span><span class="goal-row-val yellow">${carbs} g</span></div>
        <div class="goal-row"><span class="goal-row-label">🥑 Fat</span><span class="goal-row-val purple">${fat} g</span></div>
        <div class="goal-row"><span class="goal-row-label">📊 Maintenance (TDEE)</span><span class="goal-row-val green">${Math.round(tdee)} kcal</span></div>
        <div class="goal-row"><span class="goal-row-label">📉 Daily deficit</span><span class="goal-row-val">${Math.round(dailyAdj)} kcal</span></div>
      </div>
      <div class="micros-needed">
        <h4>Daily Micronutrient Targets</h4>
        <div class="micro-needed-grid">
          ${micros.map(m=>`<div class="micro-needed-item">
            <span class="mn-name">${m.name}${m.note?' · '+m.note:''}</span>
            <span class="mn-val">${m.val}</span>
          </div>`).join('')}
        </div>
      </div>
      <p style="font-size:.72rem;color:var(--muted);margin-top:14px;line-height:1.6;">
        ⚕️ Estimates based on Mifflin-St Jeor formula. Consult a doctor for personalised advice.
      </p>
    </div>`;
  updateGoalBars(
    entries.reduce((s,e)=>s+e.items.reduce((ss,i)=>ss+(i.calories||0),0),0),
    entries.reduce((s,e)=>s+e.items.reduce((ss,i)=>ss+(i.protein_g||0),0),0),
    entries.reduce((s,e)=>s+e.items.reduce((ss,i)=>ss+(i.carbs_g||0),0),0)
  );
  showToast('Goals calculated & saved!');
}

function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr?' error':'');
  setTimeout(()=>t.className='toast', 2800);
}
</script>
